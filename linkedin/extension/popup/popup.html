<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JobHunt Engine</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <div class="eyebrow">LinkedIn Automation</div>
      <div class="logo">JobHunt Engine</div>
    </div>

    <!-- Login view -->
    <div id="login-view" style="display:none; padding: 16px 0; text-align:center;">
      <div class="stat-label" style="margin-bottom:14px;">Sign in to use the extension</div>
      <div id="login-error" style="color:#f87171; font-size:11px; margin-bottom:10px; display:none;"></div>
      <button id="google-signin-btn" style="
        display:inline-flex; align-items:center; gap:10px;
        padding:10px 18px; background:#fff; border:1px solid #dadce0;
        border-radius:6px; color:#3c4043; font-size:13px; font-weight:500;
        cursor:pointer; width:100%; justify-content:center;
      ">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign in with Google
      </button>
      <div id="login-loading" style="display:none; color:#94a3b8; font-size:12px; margin-top:10px;">Opening Google sign-in…</div>
    </div>

    <!-- Main view (logged in) -->
    <div id="main-view" style="display:none;">
      <div id="user-email" style="font-size:11px; color:#64748b; margin-bottom:10px; text-align:center;"></div>

      <div class="stats-grid">
        <section class="stat-card">
          <div class="stat-label">Connections Today</div>
          <div class="stat-value" id="connections-today">--</div>
        </section>

        <section class="stat-card">
          <div class="stat-label">Daily Limit</div>
          <div class="limit-controls">
            <input id="daily-limit-input" type="number" min="1" max="100" step="1" />
            <button id="save-limit-btn" class="mini-btn">Save</button>
          </div>
        </section>

        <section class="stat-card stat-card-status">
          <div class="stat-label">Queue Status</div>
          <div class="status-pill" id="queue-status">Paused</div>
        </section>
      </div>

      <div class="footer" style="display:flex; gap:8px;">
        <a id="dashboard-link" href="#" target="_blank" class="open-btn" style="flex:1; text-align:center;">Open Dashboard</a>
        <button id="logout-btn" style="padding:8px 12px; background:#1e293b; border:1px solid #334155; border-radius:6px; color:#94a3b8; font-size:12px; cursor:pointer;">Sign out</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
